project_id = "dvyhvkzipxaotuazcjbl"   # mis à jour par deploy.sh

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[edge_runtime]
enabled = true

[functions.webauthn-register-start]
verify_jwt = true

[functions.webauthn-register-finish]
verify_jwt = true

[functions.webauthn-auth-start]
verify_jwt = false

[functions.webauthn-auth-finish]
verify_jwt = false
